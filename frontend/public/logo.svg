<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40a9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52c41a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#73d13d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" rx="20" fill="#f0f5ff"/>
  
  <!-- 宝箱底部 -->
  <rect x="40" y="100" width="120" height="60" rx="8" fill="url(#grad1)"/>
  
  <!-- 宝箱盖子 -->
  <path d="M 40 100 Q 100 70 160 100 L 160 110 Q 100 80 40 110 Z" fill="url(#grad1)"/>
  
  <!-- 宝箱锁 -->
  <circle cx="100" cy="130" r="15" fill="#ffd700"/>
  <rect x="93" y="125" width="14" height="20" rx="2" fill="#ffd700"/>
  
  <!-- 放大镜 -->
  <circle cx="65" cy="65" r="25" fill="none" stroke="#1890ff" stroke-width="6"/>
  <line x1="82" y1="82" x2="95" y2="95" stroke="#1890ff" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 数据点 -->
  <circle cx="55" cy="60" r="4" fill="#52c41a"/>
  <circle cx="75" cy="65" r="4" fill="#52c41a"/>
  <circle cx="65" cy="75" r="4" fill="#52c41a"/>
</svg>
